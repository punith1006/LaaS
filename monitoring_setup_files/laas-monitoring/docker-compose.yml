# ============================================================
# LaaS Platform — Complete Monitoring Stack
# Docker Compose v3.8
#
# Stack components:
#   Core:       Prometheus · Grafana · Alertmanager
#   Logs:       Loki · Promtail
#   Host:       node-exporter · cAdvisor
#   GPU:        DCGM Exporter
#   Network:    blackbox-exporter · coturn (metrics scrape only)
#   Custom:     mps-exporter · session-exporter
#   Status:     Uptime Kuma
#   Future:     redis-exporter (uncomment when orchestrator is deployed)
#
# Usage:
#   cp .env.example .env && nano .env          # fill in secrets
#   docker compose up -d                       # start everything
#   docker compose logs -f prometheus          # debug
# ============================================================

version: "3.8"

networks:
  laas-monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  alertmanager_data:
  uptime_kuma_data:

# ─────────────────────────────────────────────────────────────
# PROMETHEUS — metrics store + alerting rules engine
# ─────────────────────────────────────────────────────────────
services:
  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: laas-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"        # 30 days of history
      - "--storage.tsdb.retention.size=20GB"        # hard cap at 20GB
      - "--web.enable-lifecycle"                    # allows hot reload: POST /-/reload
      - "--web.enable-admin-api"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--query.max-samples=50000000"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
      # File-based service discovery directory — orchestrator writes targets here
      - ./prometheus/file_sd:/etc/prometheus/file_sd:ro
    ports:
      - "9090:9090"
    networks:
      - laas-monitoring
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────────────────────
  # GRAFANA — dashboards and visualization
  # ─────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.5.0
    container_name: laas-grafana
    restart: unless-stopped
    environment:
      # Admin credentials — change in .env
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      # Allow embedding in admin tools
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      # Anonymous access for read-only public status (optional)
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Feature flags
      GF_FEATURE_TOGGLES_ENABLE: "ngalert"
      # Loki plugin
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-piechart-panel"
      # Alerting
      GF_ALERTING_ENABLED: "true"
      GF_UNIFIED_ALERTING_ENABLED: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - laas-monitoring
    depends_on:
      - prometheus
      - loki
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ─────────────────────────────────────────────────────────────
  # ALERTMANAGER — alert routing: Telegram + Email
  # ─────────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: laas-alertmanager
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.listen-address=:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - laas-monitoring
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ─────────────────────────────────────────────────────────────
  # LOKI — log aggregation backend (Grafana native)
  # ─────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.4.2
    container_name: laas-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - laas-monitoring
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────────────────────
  # PROMTAIL — log shipper: Docker + systemd + CUDA MPS + HAMi
  # ─────────────────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:3.4.2
    container_name: laas-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /run/log/journal:/run/log/journal:ro        # systemd journal
      - /etc/machine-id:/etc/machine-id:ro
      # MPS and HAMi logs
      - /tmp/nvidia-log:/var/log/nvidia-mps:ro
      - /tmp/nvidia-mps:/run/nvidia-mps:ro
    networks:
      - laas-monitoring
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ─────────────────────────────────────────────────────────────
  # NODE EXPORTER — host hardware + OS metrics
  # ─────────────────────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: laas-node-exporter
    restart: unless-stopped
    pid: "host"                          # required for accurate process metrics
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
      - "--collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$$"
      - "--collector.systemd"            # systemd service health
      - "--collector.processes"          # process-level metrics
      - "--collector.nfs"                # NFS client metrics
      - "--collector.nvme"              # NVMe SMART data
      - "--collector.zfs"               # ZFS metrics (if ZFS is installed)
      - "--collector.textfile.directory=/var/lib/node_exporter/textfile_collector"
      - "--web.listen-address=:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket:ro   # systemd collector
      - ./node-exporter/textfile:/var/lib/node_exporter/textfile_collector  # custom textfile metrics
    ports:
      - "9100:9100"
    networks:
      - laas-monitoring
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 128M
  
