  # ─────────────────────────────────────────────────────────────
  # DCGM EXPORTER — deep GPU telemetry (the critical one)
  # Metrics: temperature, power, VRAM, SM utilization, NVENC,
  #          PCIe bandwidth, ECC errors, clocks, memory BW
  # ─────────────────────────────────────────────────────────────
  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:4.2.3-4.1.1-ubuntu22.04
    container_name: laas-dcgm-exporter
    restart: unless-stopped
    runtime: nvidia                          # requires NVIDIA Container Toolkit
    cap_add:
      - SYS_ADMIN                            # required for DCGM
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      DCGM_EXPORTER_LISTEN: ":9400"
      DCGM_EXPORTER_INTERVAL: "5000"         # 5s collection interval (default 30s is too slow)
    ports:
      - "9400:9400"
    networks:
      - laas-monitoring
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9400/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────────────────────
  # BLACKBOX EXPORTER — endpoint probing + service health
  # Probes: Selkies session health, TURN server, cloudflared,
  #         NFS exports, MPS daemon socket
  # ─────────────────────────────────────────────────────────────
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: laas-blackbox-exporter
    restart: unless-stopped
    command:
      - "--config.file=/etc/blackbox/blackbox.yml"
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox/blackbox.yml:ro
    ports:
      - "9115:9115"
    networks:
      - laas-monitoring
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 64M

  # ─────────────────────────────────────────────────────────────
  # MPS EXPORTER (CUSTOM) — CUDA MPS daemon state, NVENC count
  # Exports: mps_daemon_state, mps_fault_total, nvenc_sessions,
  #          mps_active_clients, gpu_vram_orchestrator_allocated
  # ─────────────────────────────────────────────────────────────
  mps-exporter:
    build:
      context: ./exporters/mps-exporter
      dockerfile: Dockerfile
    container_name: laas-mps-exporter
    restart: unless-stopped
    # Needs MPS pipe dir + nvidia-smi access
    volumes:
      - /tmp/nvidia-mps:/tmp/nvidia-mps
      - /tmp/nvidia-log:/tmp/nvidia-log
      - /usr/bin/nvidia-smi:/usr/bin/nvidia-smi-real:ro    # real nvidia-smi
      - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:/usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:ro
    environment:
      MPS_PIPE_DIR: /tmp/nvidia-mps
      EXPORTER_PORT: "9500"
      GPU_INDEX: "0"
      GPU_TOTAL_VRAM_MB: "32768"          # 32GB for RTX 5090; update for POC RTX 4090: 24576
    devices:
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia0:/dev/nvidia0
    ports:
      - "9500:9500"
    networks:
      - laas-monitoring
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 128M

  # ─────────────────────────────────────────────────────────────
  # SESSION EXPORTER (CUSTOM) — live session metrics from Docker
  # Exports: active_sessions_total (by tier, type, node),
  #          vram_allocated_mb, session_uptime, per-user metrics
  # Also writes file_sd targets for Selkies /metrics scraping
  # ─────────────────────────────────────────────────────────────
  session-exporter:
    build:
      context: ./exporters/session-exporter
      dockerfile: Dockerfile
    container_name: laas-session-exporter
    restart: unless-stopped
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw    # Docker API (rw needed for API access)
      - ./prometheus/file_sd:/app/file_sd               # writes Selkies scrape targets
    environment:
      EXPORTER_PORT: "9501"
      NODE_ID: ${NODE_ID:-node-mvp}
      FILE_SD_PATH: /app/file_sd/selkies_sessions.json
    ports:
      - "9501:9501"
    networks:
      - laas-monitoring
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 128M

  # ─────────────────────────────────────────────────────────────
  # UPTIME KUMA — internal service status page (admin use)
  # Access: http://host:3001
  # ─────────────────────────────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: laas-uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime_kuma_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro   # Docker container monitoring
    ports:
      - "3001:3001"
    networks:
      - laas-monitoring
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

