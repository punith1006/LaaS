groups:

  # ──────────────────────────────────────────────────────────
  # GPU TEMPERATURE ALERTS
  # RTX 5090 consumer card — NOT rated for 24/7 datacenter ops
  # Warning: 80°C | Emergency: 90°C
  # ──────────────────────────────────────────────────────────
  - name: gpu_temperature
    rules:
      - alert: GPUTemperatureHigh
        expr: DCGM_FI_DEV_GPU_TEMP > 80
        for: 2m
        labels:
          severity: warning
          category: gpu
        annotations:
          summary: "GPU temperature high on {{ $labels.node }}"
          description: "GPU {{ $labels.gpu }} on {{ $labels.node }} is {{ $value }}°C (threshold 80°C). Check airflow and fan operation."
          runbook: "Check Corsair 3500X airflow, 360mm AIO health, ambient temp in server room."

      - alert: GPUTemperatureCritical
        expr: DCGM_FI_DEV_GPU_TEMP > 90
        for: 30s
        labels:
          severity: critical
          category: gpu
        annotations:
          summary: "CRITICAL: GPU overheating on {{ $labels.node }} — THROTTLING IMMINENT"
          description: "GPU {{ $labels.gpu }} on {{ $labels.node }} is {{ $value }}°C. Emergency thermal throttling active. Sessions may degrade."
          action: "Immediate investigation required. Consider emergency session migration."

      - alert: GPUMemoryTemperatureHigh
        expr: DCGM_FI_DEV_MEMORY_TEMP > 85
        for: 2m
        labels:
          severity: warning
          category: gpu
        annotations:
          summary: "GPU memory temperature high on {{ $labels.node }}"
          description: "VRAM temp {{ $value }}°C on GPU {{ $labels.gpu }}, node {{ $labels.node }}."

  # ──────────────────────────────────────────────────────────
  # GPU POWER ALERTS
  # RTX 5090 TDP: ~575W. PSU: 1600W (shared with rest of system)
  # ──────────────────────────────────────────────────────────
  - name: gpu_power
    rules:
      - alert: GPUPowerDraw
        expr: DCGM_FI_DEV_POWER_USAGE > 520
        for: 5m
        labels:
          severity: warning
          category: gpu
        annotations:
          summary: "GPU sustained high power on {{ $labels.node }}"
          description: "GPU {{ $labels.gpu }} drawing {{ $value }}W for 5+ minutes. Monitor PSU health and thermal output."

  # ──────────────────────────────────────────────────────────
  # NVENC SESSION LIMIT ALERTS
  # Consumer RTX: firmware-limited concurrent NVENC sessions
  # nvidia-patch removes this limit but must be re-applied after driver updates
  # ──────────────────────────────────────────────────────────
  - name: nvenc_sessions
    rules:
      - alert: NVENCSessionLimitApproaching
        expr: laas_nvenc_active_sessions >= 3
        for: 1m
        labels:
          severity: warning
          category: gpu
        annotations:
          summary: "NVENC session count at limit threshold on {{ $labels.node }}"
          description: "{{ $value }} concurrent NVENC sessions. Consumer GPU limit is typically 3-5. Verify nvidia-patch is applied. If new sessions fail to encode, nvidia-patch may need re-application after a driver update."

      - alert: NVENCUtilizationHigh
        expr: DCGM_FI_DEV_ENC_UTIL > 85
        for: 5m
        labels:
          severity: warning
          category: gpu
        annotations:
          summary: "NVENC encoder saturated on {{ $labels.node }}"
          description: "NVENC utilization {{ $value }}% on GPU {{ $labels.gpu }}. Desktop streams may degrade in quality or framerate."

  # ──────────────────────────────────────────────────────────
  # CUDA MPS STATE ALERTS
  # MPS FAULT = all GPU containers on the node are affected
  # ──────────────────────────────────────────────────────────
  - name: cuda_mps
    rules:
      - alert: CUDAMPSFault
        expr: laas_mps_daemon_state == 2   # 0=stopped, 1=active, 2=fault
        for: 0s
        labels:
          severity: critical
          category: gpu
        annotations:
          summary: "CUDA MPS FAULT detected on {{ $labels.node }}"
          description: "MPS server is in FAULT state. All GPU containers on {{ $labels.node }} may have crashed. MPS watchdog should auto-recover within 60s."
          action: "Monitor recovery. If not recovered in 60s: systemctl restart cuda-mps. If that fails: full node reboot required."

      - alert: CUDAMPSDaemonDown
        expr: laas_mps_daemon_state == 0
        for: 30s
        labels:
          severity: critical
          category: gpu
        annotations:
          summary: "CUDA MPS daemon is DOWN on {{ $labels.node }}"
          description: "MPS daemon not running on {{ $labels.node }}. GPU sessions cannot start or will fail. Run: sudo systemctl restart cuda-mps"

      - alert: MPSFaultFrequencyHigh
        expr: increase(laas_mps_fault_total[1h]) > 3
        for: 1m
        labels:
          severity: warning
          category: gpu
        annotations:
          summary: "MPS faults occurring frequently on {{ $labels.node }}"
          description: "{{ $value }} MPS faults in the last hour on {{ $labels.node }}. Investigate: check for user workloads causing GPU faults (out-of-bounds CUDA memory access)."

  # ──────────────────────────────────────────────────────────
  # GPU VRAM OVERCOMMIT PROTECTION
  # Orchestrator must never overcommit physical VRAM
  # ──────────────────────────────────────────────────────────
  - name: gpu_vram
    rules:
      - alert: GPUVRAMOvercommitRisk
        expr: laas_vram_allocated_mb / laas_vram_total_mb > 0.94
        for: 1m
        labels:
          severity: warning
          category: gpu
        annotations:
          summary: "GPU VRAM allocation > 94% on {{ $labels.node }}"
          description: "{{ printf \"%.1f\" $value }}% of VRAM allocated by orchestrator on {{ $labels.node }}. Keep 2GB reserved for NVENC + driver state. Do NOT schedule new GPU sessions until VRAM frees."

      - alert: GPUVRAMOrchestatorPhysicalMismatch
        expr: abs(laas_vram_allocated_mb - DCGM_FI_DEV_FB_USED) > 2048
        for: 5m
        labels:
          severity: warning
          category: gpu
        annotations:
          summary: "VRAM tracking mismatch on {{ $labels.node }}"
          description: "Orchestrator thinks {{ $labels.node }} has allocated VRAM different from DCGM physical VRAM by > 2GB. Possible leaked containers or accounting bug."

  # ──────────────────────────────────────────────────────────
  # GPU HEALTH — ECC errors, PCIe issues
  # ──────────────────────────────────────────────────────────
  - name: gpu_health
    rules:
      - alert: GPUECCError
        expr: increase(DCGM_FI_DEV_ECC_DBE_VOL_TOTAL[10m]) > 0
        for: 0s
        labels:
          severity: critical
          category: gpu
        annotations:
          summary: "GPU ECC Double-Bit Error on {{ $labels.node }}"
          description: "GPU {{ $labels.gpu }} on {{ $labels.node }} reported a double-bit ECC error — indicates failing VRAM. Schedule hardware investigation."

      - alert: GPUPCIeReplayHigh
        expr: increase(DCGM_FI_DEV_PCIE_REPLAY_COUNTER[5m]) > 10
        for: 5m
        labels:
          severity: warning
          category: gpu
        annotations:
          summary: "High PCIe replay count on {{ $labels.node }}"
          description: "GPU {{ $labels.gpu }} PCIe replay count increasing — possible PCIe slot issue or GPU instability."

      - alert: GPUSMClockDropped
        expr: DCGM_FI_DEV_SM_CLOCK < 1000 and DCGM_FI_DEV_GPU_UTIL > 50
        for: 3m
        labels:
          severity: warning
          category: gpu
        annotations:
          summary: "GPU SM clock throttled under load on {{ $labels.node }}"
          description: "GPU is under significant load ({{ $labels.DCGM_FI_DEV_GPU_UTIL }}%) but SM clock dropped to {{ $value }}MHz. Likely thermal throttle."

      - alert: GPUNotDetected
        expr: absent(DCGM_FI_DEV_GPU_TEMP)
        for: 2m
        labels:
          severity: critical
          category: gpu
        annotations:
          summary: "DCGM can't see GPU — possible driver or hardware failure"
          description: "DCGM exporter is not reporting GPU temperature metrics. GPU may be unresponsive."
